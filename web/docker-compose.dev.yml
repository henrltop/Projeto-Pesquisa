# Sobe apenas Postgres e Redis para desenvolvimento local.
# Django roda nativo (python manage.py runserver) para iterar mais rapido.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iomat}
      POSTGRES_USER: ${POSTGRES_USER:-iomat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iomat}
    ports: ["5432:5432"]
    volumes:
      - iomat_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

volumes:
  iomat_pg_data:
