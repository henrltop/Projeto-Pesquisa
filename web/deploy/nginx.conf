# Server block do IOMAT Mineracao.
# A faculdade termina o HTTPS num PROXY CENTRAL (TLS a montante): este nginx
# recebe HTTP na porta 80 vindo desse proxy. NAO use certbot aqui.
# 1) Troque SEU_DOMINIO pelo dominio real.
# 2) Copie para /etc/nginx/sites-available/iomat e crie o symlink.
# 3) Peca a TI para encaminhar SEU_DOMINIO -> http://ESTE_SERVIDOR:80,
#    preservando o header Host e enviando X-Forwarded-Proto: https.

server {
    listen 80;
    server_name SEU_DOMINIO;

    # PDFs e uploads podem ser grandes
    client_max_body_size 25M;

    # Arquivos estaticos (gerados por `collectstatic` em STATIC_ROOT)
    location /static/ {
        alias /srv/iomat/web/staticfiles/;
        access_log off;
        expires 30d;
    }

    # PDFs baixados sob demanda
    location /media/ {
        alias /srv/iomat/web/media/;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # TLS e terminado no proxy da faculdade; informamos ao Django que a
        # origem e HTTPS (SECURE_PROXY_SSL_HEADER do prod.py espera isso).
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }
}
