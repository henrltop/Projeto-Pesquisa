# Server block do IOMAT Mineracao.
# 1) Troque SEU_DOMINIO pelo dominio real.
# 2) Copie para /etc/nginx/sites-available/iomat e crie o symlink em
#    sites-enabled (ver deploy/README.md).
# 3) Rode `certbot --nginx -d SEU_DOMINIO` -- o certbot adiciona o bloco
#    443 (TLS) e o redirecionamento de 80 -> 443 automaticamente.

server {
    listen 80;
    server_name SEU_DOMINIO;

    # PDFs e uploads podem ser grandes
    client_max_body_size 25M;

    # Arquivos estaticos (gerados por `collectstatic` em STATIC_ROOT)
    location /static/ {
        alias /srv/iomat/web/staticfiles/;
        access_log off;
        expires 30d;
    }

    # PDFs baixados sob demanda
    location /media/ {
        alias /srv/iomat/web/media/;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Necessario para o SECURE_PROXY_SSL_HEADER do prod.py reconhecer HTTPS
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
